---
title: Our Team
---

<div class="content">
	<section>
		<div class="container">
			<div class="text editable" style="margin-bottom: 48px;">
				<h2>Our Team</h2>
				<p style="margin-bottom: 0;">Meet the talented team behind CASSIE. We're a group of passionate developers working together to create innovative solutions for genomic data analysis.</p>
			</div>
		</div>
	</section>
	
	<section style="padding-top: 0;">
		<div class="container">
			<ul class="staff">
	{% for person in site.staff_members %}
		<li>
			<div class="square-image"><img src="{% include relative-src.html src=person.image_path %}" alt="{{ person.name }}"/></div>
            <div class="name"><a target="_blank" href="https://github.com/{{ person.github }}">{{ person.name }}</a></div>
			<div class="position">{{ person.position }}</div>
		</li>
	{% endfor %}
			</ul>
		</div>
	</section>
</div>
