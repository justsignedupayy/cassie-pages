<!doctype html>

<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">

		{% seo %}
		{% feed_meta %}

		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
		<link rel="stylesheet" href="{{ site.baseurl }}/css/screen.css">
		<link rel="icon" type="image/png" sizes="32x32" href="{{ site.baseurl }}/favicon.png?v=cassie-logo">
		<link rel="shortcut icon" type="image/png" href="{{ site.baseurl }}/favicon.png?v=cassie-logo">
		<link rel="apple-touch-icon" href="{{ site.baseurl }}/apple-touch-icon.png?v=cassie-logo">
		<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
		<script src="{{ site.baseurl }}/js/particles.js" defer></script>
		<script src="{{ site.baseurl }}/js/dna-helix-3d.js" defer></script>
		<script src="{{ site.baseurl }}/js/scroll-animations.js" defer></script>

		{% if jekyll.environment == 'production' and site.google_analytics_key and site.google_analytics_key != '' %}
			<script>
				window.ga=window.ga||function(){(ga.q=ga.q||[]).push(arguments)};ga.l=+new Date;
				ga('create', '{{ site.google_analytics_key }}', 'auto');
				ga('send', 'pageview');
			</script>
			<script async src='https://www.google-analytics.com/analytics.js'></script>
		{% endif %}
	</head>
	<body>
		<header>
			<div class="container">
                <div class="company-name">
					<a href="{{ site.baseurl }}/" aria-label="{{ site.title }} home">
						<img src="{{ site.baseurl }}/images/cassie_logo.png" alt="{{ site.title }} logo">
						<span>CASSIE</span>
					</a>
				</div>
				{% include navigation.html %}
			</div>
		</header>
		{{ content }}
        <footer>
            <p class="copyright">&copy; {{ site.time | date: '%Y' }} {{ site.title }}</p>
        </footer>
		<script>
			document.getElementById("open-nav").onclick = function () {
				document.body.classList.toggle("nav-open");
				return false;
			};
		</script>
	</body>
</html>
